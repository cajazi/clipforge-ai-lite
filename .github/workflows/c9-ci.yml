name: C9 Animation Validation CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: c9-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm-tests:
    name: JVM Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run JVM unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload JVM reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: jvm-tests

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK/build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-reports
          path: |
            app/build/outputs/apk/debug/
            app/build/reports/

  c9-jvm-validation:
    name: C9 JVM Validation Gates
    runs-on: ubuntu-latest
    needs: jvm-tests

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run C9 JVM validation tests
        run: |
          ./gradlew testDebugUnitTest --tests "com.clipforge.ai.validation.c9.*" --stacktrace

  emulator-tests:
    name: Android Instrumented Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run connected Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
            artifacts/c9/