name: C9 Production Animation CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: c9-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  validate:
    name: Validate & Compile (JVM Gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Clean build
        run: ./gradlew clean --no-daemon

      - name: Run JVM unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon

      - name: Upload JVM reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/

  build:
    name: Debug Build Gate
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/

  android-tests:
    name: Android Instrumentation Tests
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_2

          disable-animations: true
          emulator-boot-timeout: 900

          emulator-options: >
            -no-window
            -no-audio
            -gpu swiftshader_indirect
            -no-snapshot
            -no-boot-anim
            -camera-back none
            -camera-front none

          # Exclude real-GPU/device-only tests: the software emulator has no usable GPU or hardware
          # video codec, so real GL+MediaCodec/Transformer exports fail/crash and preview-wiring tests
          # produce stable zero/empty-effect output there. These tests are annotated @RequiresRealGpu
          # (a superset of @RequiresGpuExport) and still run on real devices (see annotation doc).
          script: |
            adb wait-for-device
            adb logcat -c || true
            set +e
            ./gradlew connectedDebugAndroidTest "-Pandroid.testInstrumentationRunnerArguments.notAnnotation=com.clipforge.ai.RequiresRealGpu" --stacktrace --no-daemon
            status=$?
            if [ "$status" -ne 0 ]; then
              adb logcat -d > instrumentation-logcat.txt || true
            fi
            exit "$status"

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
            instrumentation-logcat.txt

  c9-validation:
    name: C9 Validation Gates
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run C9 parity + lifecycle validation
        run: ./gradlew testDebugUnitTest --tests "com.clipforge.ai.validation.c9.*" --stacktrace --no-daemon

  performance:
    name: Performance Safety Gate
    runs-on: ubuntu-latest
    needs: c9-validation

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Assert device-only performance test exists and stays GPU-gated
        run: |
          set -euo pipefail

          # AnimationPerformanceTest is an instrumented @RequiresGpuExport / @RequiresRealGpu test that
          # drives preview timing proxies plus real Transformer/MediaCodec export. The JVM
          # testDebugUnitTest task cannot see or execute it, and GitHub-hosted runners have no usable
          # hardware GPU/codec device, so we do NOT run it here -- the real performance budget check
          # runs on attached SM-A165F-class hardware. This gate instead statically guarantees the
          # device-only test still exists, stays annotated, and keeps both budget cases, so it can
          # never silently be deleted or downgraded into a JVM/emulator test without review.
          TEST_FILE="app/src/androidTest/java/com/clipforge/ai/validation/c9/AnimationPerformanceTest.kt"

          if [ ! -f "$TEST_FILE" ]; then
            echo "::error::Device-only performance test is missing: $TEST_FILE"
            exit 1
          fi

          require() {
            if ! grep -Fq "$1" "$TEST_FILE"; then
              echo "::error::$TEST_FILE must contain: $1"
              exit 1
            fi
          }

          require "@RequiresGpuExport"
          require "@RequiresRealGpu"
          require "preview_frame_resolution_cost_meets_budget_across_concurrency_levels"
          require "export_duration_regression_and_memory_overhead_within_budget"

          echo "OK: $TEST_FILE exists, is GPU-gated, and retains both performance budget cases"

  artifacts:
    name: Collect CI Evidence
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
      - android-tests
      - c9-validation
      - performance
    if: always()

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Upload C9 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: c9-production-artifacts
          path: |
            app/build/reports/
            app/build/test-results/
            app/build/outputs/androidTest-results/
            artifacts/c9/
          if-no-files-found: ignore
