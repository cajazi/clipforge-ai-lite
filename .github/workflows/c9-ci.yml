name: C9 Production Animation CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: c9-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:

# ─────────────────────────────
# 1. VALIDATE & COMPILE (FAST FAIL)
# ─────────────────────────────
  validate:
    name: Validate & Compile (JVM Gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Clean build (hard reset)
        run: ./gradlew clean

      - name: Compile & run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

# ─────────────────────────────
# 2. DEBUG BUILD GATE
# ─────────────────────────────
  build:
    name: Debug Build Gate
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Debug APK (strict)
        run: ./gradlew assembleDebug --stacktrace

# ─────────────────────────────
# 3. ANDROID INSTRUMENTATION (EMULATOR)
# ─────────────────────────────
  android-tests:
    name: Android Instrumentation Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run instrumented tests (emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -no-snapshot -no-boot-anim
          script: ./gradlew connectedDebugAndroidTest --stacktrace

# ─────────────────────────────
# 4. C9 VALIDATION GATES (PARITY + LOGIC)
# ─────────────────────────────
  c9-validation:
    name: C9 Validation Gates
    runs-on: ubuntu-latest
    needs: android-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run C9 parity + lifecycle validation
        run: |
          ./gradlew testDebugUnitTest --tests "com.clipforge.ai.validation.c9.*" --stacktrace

# ─────────────────────────────
# 5. PERFORMANCE SAFETY GATE (C9.1 READY)
# ─────────────────────────────
  performance:
    name: Performance Safety Gate
    runs-on: ubuntu-latest
    needs: c9-validation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run performance baseline checks
        run: |
          ./gradlew testDebugUnitTest --tests "*AnimationPerformance*" --stacktrace || true

# ─────────────────────────────
# 6. ARTIFACT COLLECTION (AUDITABILITY)
# ─────────────────────────────
  artifacts:
    name: Collect CI Evidence
    runs-on: ubuntu-latest
    needs: performance
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Upload JVM + Android reports
        uses: actions/upload-artifact@v4
        with:
          name: c9-production-reports
          path: |
            app/build/reports/
            app/build/test-results/
            artifacts/c9/