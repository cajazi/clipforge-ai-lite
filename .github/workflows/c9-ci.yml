name: C9 Production Animation CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: c9-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  validate:
    name: Validate & Compile (JVM Gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Clean build
        run: ./gradlew clean --no-daemon

      - name: Run JVM unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon

      - name: Upload JVM reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/

  build:
    name: Debug Build Gate
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/

  android-tests:
    name: Android Instrumentation Tests
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_2

          disable-animations: true
          emulator-boot-timeout: 900

          emulator-options: >
            -no-window
            -no-audio
            -gpu swiftshader_indirect
            -no-snapshot
            -no-boot-anim
            -camera-back none
            -camera-front none

          # Exclude GPU/hardware-codec export tests: the software emulator has no usable GPU or
          # hardware video codec, so real GL+MediaCodec/Transformer exports fail/crash there. These
          # tests are annotated @RequiresGpuExport and still run on real devices (see annotation doc).
          script: |
            adb logcat -c
            set +e
            ./gradlew connectedDebugAndroidTest "-Pandroid.testInstrumentationRunnerArguments.notAnnotation=com.clipforge.ai.RequiresGpuExport" --stacktrace --no-daemon
            status=$?
            if [ "$status" -ne 0 ]; then
              adb logcat -d > instrumentation-logcat.txt || true
            fi
            exit "$status"

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
            instrumentation-logcat.txt

  c9-validation:
    name: C9 Validation Gates
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run C9 parity + lifecycle validation
        run: ./gradlew testDebugUnitTest --tests "com.clipforge.ai.validation.c9.*" --stacktrace --no-daemon

  performance:
    name: Performance Safety Gate (Device Only)
    runs-on: ubuntu-latest
    needs: c9-validation

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Assert device-only performance test exists and stays GPU-gated
        run: |
          set -euo pipefail

          # AnimationPerformanceTest drives preview timing proxies plus real Transformer/MediaCodec
          # export, so it is an instrumented @RequiresGpuExport test that the JVM testDebugUnitTest
          # task cannot see. GitHub-hosted runners do not provide the required SM-A165F-class hardware
          # GPU/codec device, so we intentionally do NOT run connectedDebugAndroidTest here -- the real
          # performance budget check runs on attached hardware. This gate instead statically guarantees
          # that the device-only test still exists and remains annotated, so it can never silently be
          # deleted or downgraded into a JVM/emulator test without review.
          TEST_FILE="app/src/androidTest/java/com/clipforge/ai/validation/c9/AnimationPerformanceTest.kt"

          if [ ! -f "$TEST_FILE" ]; then
            echo "::error::Device-only performance test is missing: $TEST_FILE"
            exit 1
          fi

          if ! grep -Eq '^[[:space:]]*@RequiresGpuExport[[:space:]]*$' "$TEST_FILE"; then
            echo "::error::AnimationPerformanceTest must remain annotated @RequiresGpuExport in $TEST_FILE"
            exit 1
          fi

          if ! grep -Eq '^[[:space:]]*class[[:space:]]+AnimationPerformanceTest\b' "$TEST_FILE"; then
            echo "::error::class AnimationPerformanceTest not found in $TEST_FILE"
            exit 1
          fi

          echo "OK: $TEST_FILE exists and remains annotated @RequiresGpuExport"

  artifacts:
    name: Collect CI Evidence
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
      - android-tests
      - c9-validation
      - performance
    if: always()

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Upload C9 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: c9-production-artifacts
          path: |
            app/build/reports/
            app/build/test-results/
            app/build/outputs/androidTest-results/
            artifacts/c9/
          if-no-files-found: ignore
