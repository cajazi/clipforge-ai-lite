name: C9 Animation Validation CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:

  jvm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: ./gradlew testDebugUnitTest

  build:
    runs-on: ubuntu-latest
    needs: jvm-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: ./gradlew assembleDebug

  emulator-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest

  c9-validation:
    runs-on: ubuntu-latest
    needs: emulator-tests
    steps:
      - uses: actions/checkout@v4

      - run: |
          ./gradlew testDebugUnitTest --tests "*AnimationMatrixParityTest"
          ./gradlew testDebugUnitTest --tests "*AnimationLifecycleStressTest"
          ./gradlew testDebugUnitTest --tests "*EffectParamsDeterminismTest"

  artifacts:
    runs-on: ubuntu-latest
    needs: c9-validation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/upload-artifact@v4
        with:
          name: c9-reports
          path: |
            app/build/reports/
            artifacts/c9/