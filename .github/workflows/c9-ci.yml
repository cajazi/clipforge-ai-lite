name: C9 Production Animation CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: c9-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  validate:
    name: Validate & Compile (JVM Gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Clean build
        run: ./gradlew clean --no-daemon

      - name: Run JVM unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon

      - name: Upload JVM reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/

  build:
    name: Debug Build Gate
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/

  android-tests:
    name: Android Instrumentation Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      # - name: Run instrumented tests on emulator
      #   uses: reactivecircus/android-emulator-runner@v2
      #   with:
      #     api-level: 30
      #     target: default
      #     arch: x86_64
      #     profile: pixel_2
      #     disable-animations: true
      #     emulator-boot-timeout: 900
      #     emulator-options: >
      #       -no-window
      #       -no-audio
      #       -no-boot-anim
      #       -gpu swiftshader_indirect
      #       -no-snapshot
      #       -camera-back none
      #     script: ./gradlew connectedDebugAndroidTest --stacktrace --no-daemon

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6

          disable-animations: true
          emulator-boot-timeout: 900

          emulator-options: >
            -no-window
            -no-audio
            -gpu swiftshader_indirect
            -no-snapshot
            -no-boot-anim
            -camera-back none

          script: ./gradlew connectedDebugAndroidTest --stacktrace --no-daemon

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/

  c9-validation:
    name: C9 Validation Gates
    runs-on: ubuntu-latest
    needs: android-tests

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run C9 parity + lifecycle validation
        run: ./gradlew testDebugUnitTest --tests "com.clipforge.ai.validation.c9.*" --stacktrace --no-daemon

  performance:
    name: Performance Safety Gate
    runs-on: ubuntu-latest
    needs: c9-validation

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run performance baseline checks
        run: ./gradlew testDebugUnitTest --tests "*AnimationPerformance*" --stacktrace --no-daemon

  artifacts:
    name: Collect CI Evidence
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
      - android-tests
      - c9-validation
      - performance
    if: always()

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Upload C9 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: c9-production-artifacts
          path: |
            app/build/reports/
            app/build/test-results/
            app/build/outputs/androidTest-results/
            artifacts/c9/
          if-no-files-found: ignore